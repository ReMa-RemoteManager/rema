<!DOCTYPE html>
<html lang="de" data-lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>ReMa — Remote Manager</title>
<meta name="description" content="Sicherer Remote-Zugriff für Windows. Multi-Monitor, verschlüsselt, kostenlos."/>
<meta name="robots" content="index,follow"/>
<meta property="og:title" content="ReMa — Remote Manager"/>
<meta property="og:description" content="Sicherer Remote-Zugriff für Windows. Multi-Monitor, AES-256, kostenlos."/>
<meta property="og:type" content="website"/>
<meta name="theme-color" content="#08080A"/>

<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='2' y='2' width='11' height='11' rx='3' stroke='%23FF3B30' stroke-width='2' fill='none'/%3E%3Crect x='19' y='19' width='11' height='11' rx='3' stroke='%23FF3B30' stroke-width='2' fill='none'/%3E%3Ccircle cx='24' cy='8' r='5' fill='%23FF3B30'/%3E%3C/svg%3E"/>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080A;
  --s1:#111114;
  --s2:#18181C;
  --s3:#222227;
  --b:rgba(255,255,255,0.06);
  --bh:rgba(255,255,255,0.11);
  --red:#FF3B30;
  --red-a:rgba(255,59,48,0.13);
  --red-b:rgba(255,59,48,0.22);
  --w:#F5F5F7;
  --g1:#A1A1AA;
  --g2:#52525B;
  --g3:#3F3F46;
  --r:14px;
}
html{scroll-behavior:smooth;height:100%}
body{
  background:var(--bg);color:var(--w);
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;line-height:1.5;
}

/* ══════════════════════════════
   NAV
══════════════════════════════ */
nav{
  position:fixed;inset:0 0 auto 0;z-index:200;
  height:54px;display:flex;align-items:center;
  justify-content:space-between;padding:0 32px;
  transition:background .35s ease,border-color .35s ease;
  border-bottom:1px solid transparent;
}
nav.solid{
  background:rgba(8,8,10,.88);
  backdrop-filter:blur(32px) saturate(180%);
  -webkit-backdrop-filter:blur(32px) saturate(180%);
  border-bottom-color:var(--b);
}
.nav-l{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo-svg{width:28px;height:28px;flex-shrink:0}
.nav-name{font-size:15px;font-weight:700;color:var(--w);letter-spacing:-.025em}
.nav-r{display:flex;align-items:center;gap:4px}
.nav-r a{
  font-size:13px;font-weight:500;color:var(--g1);text-decoration:none;
  padding:6px 11px;border-radius:8px;
  transition:color .15s,background .15s;
}
.nav-r a:hover{color:var(--w);background:rgba(255,255,255,.06)}
.nav-dl-btn{
  background:var(--red)!important;color:#fff!important;
  font-weight:600!important;border-radius:9px!important;
  transition:opacity .15s!important;margin-left:6px;
}
.nav-dl-btn:hover{opacity:.84!important;background:var(--red)!important}

/* language picker dropdown */
.lang-drop{position:relative;margin-left:8px}
.lang-trigger{
  display:flex;align-items:center;gap:5px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--b);border-radius:8px;
  padding:5px 9px;cursor:pointer;
  color:var(--g1);font-size:12px;font-weight:600;
  transition:background .15s,border-color .15s,color .15s;
  font-family:inherit;
}
.lang-trigger:hover{background:rgba(255,255,255,.08);border-color:var(--bh);color:var(--w)}
.lang-chevron{transition:transform .2s cubic-bezier(.22,1,.36,1)}
.lang-drop.open .lang-chevron{transform:rotate(180deg)}
.lang-menu{
  position:absolute;top:calc(100% + 6px);right:0;
  background:#1a1a1e;border:1px solid var(--b);border-radius:10px;
  padding:4px;min-width:130px;
  box-shadow:0 16px 40px rgba(0,0,0,.6);
  opacity:0;transform:translateY(-6px) scale(.97);
  pointer-events:none;
  transition:opacity .18s cubic-bezier(.22,1,.36,1),transform .18s cubic-bezier(.22,1,.36,1);
  z-index:300;
}
.lang-drop.open .lang-menu{opacity:1;transform:none;pointer-events:all}
.lang-opt{
  display:flex;align-items:center;width:100%;text-align:left;
  padding:7px 10px;border-radius:7px;cursor:pointer;
  font-size:12px;font-weight:500;color:var(--g1);
  background:none;border:none;font-family:inherit;
  transition:background .12s,color .12s;
}
.lang-opt:hover{background:rgba(255,255,255,.07);color:var(--w)}
.lang-opt.active{color:var(--red);background:var(--red-a)}

/* preview bar: Windows style */
.preview-bar{
  height:40px;background:#1a1a1e;
  display:flex;align-items:center;padding:0 0 0 10px;
  border-bottom:1px solid var(--b);flex-shrink:0;
  gap:0;
}
.preview-bar-l{display:flex;align-items:center;gap:5px;flex-shrink:0}
.pbar-logo{width:16px;height:16px;object-fit:contain}
.pbar-appname{font-size:11px;font-weight:700;color:var(--w);letter-spacing:-.01em}
.pbar-appsub{font-size:10px;color:var(--g2);font-weight:400}
.preview-title{
  font-size:11px;color:var(--g2);font-weight:400;
  flex:1;text-align:center;letter-spacing:.01em;pointer-events:none;
}
.preview-winbtns{
  display:flex;align-items:stretch;align-self:stretch;flex-shrink:0;margin-left:auto;
}
.pwb{
  display:flex;align-items:center;justify-content:center;
  width:40px;height:100%;color:var(--g2);
  transition:background .12s,color .12s;
}
.pwb:hover{background:rgba(255,255,255,.08);color:var(--w)}
.pwb-close:hover{background:#c42b1c!important;color:#fff!important}

/* ══════════════════════════════
   HERO
══════════════════════════════ */
.hero{
  min-height:100svh;
  display:grid;
  grid-template-rows:1fr auto;
  padding-top:54px;
  overflow:hidden;
}
.hero-content{
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;
  padding:60px 24px 48px;
  position:relative;
  z-index:2;
}

/* ── big logo in hero ── */
.hero-logo{
  display:flex;flex-direction:column;align-items:center;
  margin-bottom:40px;
  opacity:0;transform:translateY(20px);
  animation:rise .8s .05s cubic-bezier(.22,1,.36,1) forwards;
}
.hero-logo{
  position:relative;
}
.hero-logo::before{
  content:'';
  position:absolute;
  width:90px;
  height:90px;
  border-radius:50%;
  background:rgba(255,59,48,.18);
  filter:blur(24px);
  z-index:-1;
}
.hero-logo-svg{
  width:72px;
  height:72px;
  object-fit:contain;
  filter:
    drop-shadow(0 0 6px rgba(255,59,48,.25))
    drop-shadow(0 0 14px rgba(255,59,48,.18));
}
.hero-logo-label{
  font-size:13px;font-weight:600;color:var(--g1);
  letter-spacing:.06em;text-transform:uppercase;margin-top:10px;
}

.hero-h1{
  font-size:clamp(46px,8.5vw,106px);
  font-weight:900;line-height:.97;
  letter-spacing:-.045em;color:var(--w);
  max-width:880px;margin-bottom:22px;
}
.hero-h1 .word{
  display:inline-block;
  opacity:0;transform:translateY(22px);
  animation:rise .75s cubic-bezier(.22,1,.36,1) forwards;
}
.hero-h1 .w1{animation-delay:.18s}
.hero-h1 .w2{animation-delay:.26s}
.hero-h1 .w3{animation-delay:.34s}
.hero-h1 .w4{animation-delay:.42s}
.hero-h1 .br{display:block;height:.08em}

.hero-sub{
  font-size:clamp(15px,1.8vw,18px);
  color:var(--g1);font-weight:400;line-height:1.65;
  max-width:380px;margin-bottom:44px;
  opacity:0;transform:translateY(14px);
  animation:rise .75s .50s cubic-bezier(.22,1,.36,1) forwards;
}

.dl-group{
  display:flex;flex-direction:column;align-items:center;gap:10px;
  opacity:0;transform:translateY(14px);
  animation:rise .75s .60s cubic-bezier(.22,1,.36,1) forwards;
}
.btn-dl{
  display:inline-flex;align-items:center;gap:9px;
  background:var(--red);color:#fff;text-decoration:none;
  font-size:15px;font-weight:700;
  padding:14px 32px;border-radius:13px;
  letter-spacing:-.01em;border:none;cursor:pointer;
  transition:transform .22s cubic-bezier(.34,1.56,.64,1),opacity .15s;
  box-shadow:0 6px 28px rgba(255,59,48,.4);
  position:relative;
}
.btn-dl:hover{transform:translateY(-2px) scale(1.025);opacity:.91}
.btn-dl:active{transform:scale(.97)}
.btn-dl.loading{opacity:.4;pointer-events:none}
.dl-meta{font-size:12px;color:var(--g2);letter-spacing:.01em}

/* Apple-Style Anpassung für vertikale Button-Texte */
.btn-text-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  line-height: 1.25;
}
.btn-version {
  display: none; /* Wird per JS sichtbar geschaltet, sobald Version geladen ist */
  font-size: 11px;
  font-weight: 500;
  opacity: 0.5;
  margin-top: 2px;
  letter-spacing: 0px;
}

/* ── hero app preview ── */
.hero-preview{
  width:100%;
  max-width:1060px;
  margin:0 auto;
  padding:0 20px;
  opacity:0;transform:translateY(36px) scale(.98);
  animation:rise .95s .78s cubic-bezier(.22,1,.36,1) forwards;
  position:relative;
  z-index:1;
}
.preview-frame{
  width:100%;
  border-radius:18px 18px 0 0;
  border:1px solid var(--bh);
  border-bottom:none;
  overflow:hidden;
  background:var(--s1);
  box-shadow:
    0 -2px 0 0 rgba(255,255,255,.06),
    0 40px 120px rgba(0,0,0,.7),
    0 0 0 1px rgba(0,0,0,.5);
}
.preview-bar{
  height:36px;background:var(--s2);
  display:flex;align-items:center;padding:0 14px;gap:7px;
  border-bottom:1px solid var(--b);
  flex-shrink:0;
}

/* mock UI inside preview */
.preview-ui{
  display:flex;height:clamp(220px,30vw,400px);overflow:hidden;
}
.preview-sidebar{
  width:200px;flex-shrink:0;
  border-right:1px solid var(--b);
  padding:16px 0;
  display:flex;flex-direction:column;gap:2px;
}
.ps-logo{
  display:flex;align-items:center;gap:8px;
  padding:4px 16px 14px;
  border-bottom:1px solid var(--b);
  margin-bottom:10px;
}
.ps-logo-ico{width:22px;height:22px}
.ps-logo-txt{font-size:12px;font-weight:700;color:var(--w);letter-spacing:-.01em}
.ps-logo-sub{font-size:10px;color:var(--g2);font-weight:400}
.ps-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;margin:0 6px;border-radius:8px;
  font-size:12px;color:var(--g1);cursor:default;
  transition:background .15s;
}
.ps-item:hover{background:rgba(255,255,255,.05)}
.ps-item.active{background:rgba(255,59,48,.14);color:var(--red)}
.ps-item svg{width:13px;height:13px;flex-shrink:0}
.ps-section{font-size:10px;color:var(--g3);font-weight:600;
  letter-spacing:.08em;text-transform:uppercase;
  padding:10px 16px 4px;
}
.preview-main{
  flex:1;overflow:hidden;
  display:flex;flex-direction:column;
}
.preview-topbar{
  height:44px;border-bottom:1px solid var(--b);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 20px;flex-shrink:0;
}
.ptb-title{font-size:13px;font-weight:600;color:var(--w)}
.ptb-btn{
  font-size:11px;font-weight:600;color:#fff;
  background:var(--red);padding:5px 12px;border-radius:7px;
  display:flex;align-items:center;gap:5px;
}
.ptb-btn svg{width:11px;height:11px}
.preview-grid{
  flex:1;
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--b);
  padding:1px;
}
.pg-card{
  background:var(--s2);padding:16px;
  display:flex;flex-direction:column;gap:8px;
}
.pgc-head{display:flex;align-items:center;gap:8px}
.pgc-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.pgc-dot.on{background:#30D158}
.pgc-dot.off{background:var(--g3)}
.pgc-name{font-size:12px;font-weight:600;color:var(--w)}
.pgc-host{font-size:10px;color:var(--g2)}
.pgc-btn{
  margin-top:auto;font-size:10px;font-weight:600;
  color:var(--red);background:var(--red-a);
  padding:5px 10px;border-radius:6px;text-align:center;
  width:fit-content;
}
.pgc-badge{
  font-size:9px;font-weight:700;
  background:#0dcfba;color:#000;
  padding:1px 5px;border-radius:3px;
  letter-spacing:.04em;
}

@media(max-width:640px){
  .preview-sidebar{display:none}
  .preview-ui{height:clamp(180px,50vw,320px)}
  .preview-grid{grid-template-columns:repeat(2,1fr)}
}

/* scroll arrow */
.scroll-arr{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:32px 0 20px;
  opacity:0;animation:rise 1s 1.3s ease forwards;
}
.scroll-arr span{font-size:11px;color:var(--g3);letter-spacing:.08em;text-transform:uppercase}
.arr-chevron{
  width:18px;height:18px;
  border-right:1.5px solid var(--g3);
  border-bottom:1.5px solid var(--g3);
  transform:rotate(45deg);
  animation:bob 2s 1.6s ease-in-out infinite;
}
@keyframes bob{0%,100%{transform:rotate(45deg) translate(0,0)}50%{transform:rotate(45deg) translate(3px,3px)}}

/* ══════════════════════════════
   KEYFRAMES
══════════════════════════════ */
@keyframes rise{
  to{opacity:1;transform:translateY(0) scale(1)}
}

/* ══════════════════════════════
   SCROLL REVEAL
══════════════════════════════ */
.rev{
  opacity:0;transform:translateY(28px);
  transition:opacity .7s cubic-bezier(.22,1,.36,1),
             transform .7s cubic-bezier(.22,1,.36,1);
}
.rev.in{opacity:1;transform:none}
.rev-s{
  opacity:0;transform:scale(.96) translateY(20px);
  transition:opacity .8s cubic-bezier(.22,1,.36,1),
             transform .8s cubic-bezier(.22,1,.36,1);
}
.rev-s.in{opacity:1;transform:none}
.stag>*{
  opacity:0;transform:translateY(22px);
  transition:opacity .6s cubic-bezier(.22,1,.36,1),
             transform .6s cubic-bezier(.22,1,.36,1);
}
.stag.in>*:nth-child(1){opacity:1;transform:none;transition-delay:.00s}
.stag.in>*:nth-child(2){opacity:1;transform:none;transition-delay:.07s}
.stag.in>*:nth-child(3){opacity:1;transform:none;transition-delay:.14s}
.stag.in>*:nth-child(4){opacity:1;transform:none;transition-delay:.21s}
.stag.in>*:nth-child(5){opacity:1;transform:none;transition-delay:.28s}
.stag.in>*:nth-child(6){opacity:1;transform:none;transition-delay:.35s}

/* ══════════════════════════════
   LAYOUT
══════════════════════════════ */
.w{max-width:980px;margin:0 auto;padding:0 24px}
.sec{padding:110px 0}
.eyebrow{
  font-size:11px;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--red);margin-bottom:12px;
}
.sec-h{
  font-size:clamp(30px,4.2vw,50px);font-weight:800;
  line-height:1.05;letter-spacing:-.035em;
  color:var(--w);margin-bottom:13px;
}
.sec-p{
  font-size:16px;color:var(--g1);line-height:1.7;
  max-width:400px;margin-bottom:60px;
}
.line-sep{
  width:1px;height:70px;
  background:linear-gradient(to bottom,transparent,var(--b),transparent);
  margin:0 auto;
}

/* ══════════════════════════════
   FEATURES
══════════════════════════════ */
.feat-grid{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:1px;background:var(--b);
  border:1px solid var(--b);border-radius:16px;overflow:hidden;
}
.feat{
  background:var(--s2);padding:30px 24px;
  transition:background .18s;cursor:default;
}
.feat:hover{background:var(--s3)}
.feat-ico{
  width:38px;height:38px;border-radius:10px;
  background:var(--red-a);
  display:flex;align-items:center;justify-content:center;
  margin-bottom:16px;color:var(--red);
  transition:transform .3s cubic-bezier(.34,1.56,.64,1),background .2s;
}
.feat:hover .feat-ico{transform:scale(1.12);background:var(--red-b)}
.feat-ico svg{width:16px;height:16px}
.feat h3{font-size:14px;font-weight:700;color:var(--w);margin-bottom:6px;letter-spacing:-.01em}
.feat p{font-size:13px;color:var(--g1);line-height:1.65}

/* ══════════════════════════════
   SCREENSHOTS
══════════════════════════════ */
.shots-sticky-wrap{height:280vh;position:relative}
.shots-sticky{
  position:sticky;top:0;height:100svh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:54px 24px 36px;overflow:hidden;
}
.shots-hdr{text-align:center;margin-bottom:28px;flex-shrink:0}
.shots-hdr .sec-h{font-size:clamp(24px,3.2vw,38px);margin-bottom:0}
.shot-stage{
  width:100%;max-width:860px;
  position:relative;flex:1;
  display:flex;align-items:center;
}
.shot-frame{
  width:100%;
  height:min(54svh,500px);
  border-radius:16px;border:1px solid var(--b);
  overflow:hidden;background:var(--s2);
  box-shadow:0 32px 90px rgba(0,0,0,.65);
  position:relative;
}
.shot-p{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .5s cubic-bezier(.22,1,.36,1),
             transform .5s cubic-bezier(.22,1,.36,1);
}
.shot-p img{width:100%;height:100%;object-fit:cover;display:block}
.shot-p.active{opacity:1;transform:scale(1)}
.shot-p.off-l{opacity:0;transform:scale(.97) translateX(-18px);pointer-events:none}
.shot-p.off-r{opacity:0;transform:scale(.97) translateX(18px);pointer-events:none}
.shot-empty{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;height:100%;
  color:var(--g2);font-size:13px;text-align:center;gap:10px;line-height:1.7;
}
.shot-empty code{
  font-family:'SF Mono','Fira Mono',monospace;font-size:11px;
  background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px;
}

.shot-frame{touch-action:pan-y}
.shots-footer{flex-shrink:0;width:100%;max-width:860px;margin-top:16px}
.shots-prog{height:2px;background:var(--b);border-radius:2px;overflow:hidden}
.shots-bar{height:100%;background:var(--red);border-radius:2px;width:0%;transition:width .08s linear}
.shot-dots{display:flex;gap:8px;justify-content:center;margin-top:14px}
.shot-dot{
  width:6px;height:6px;border-radius:50%;background:var(--g3);
  cursor:pointer;transition:background .25s,transform .3s cubic-bezier(.34,1.56,.64,1);
}
.shot-dot.active{background:var(--w);transform:scale(1.5)}

/* ══════════════════════════════
   SECURITY
══════════════════════════════ */
.sec-grid{
  display:grid;grid-template-columns:repeat(2,1fr);
  gap:1px;background:var(--b);
  border:1px solid var(--b);border-radius:16px;overflow:hidden;
}
.sec-item{background:var(--s2);padding:30px;transition:background .18s}
.sec-item:hover{background:var(--s3)}
.sec-tag{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--red);display:block;margin-bottom:8px;
}
.sec-item h4{font-size:14px;font-weight:700;color:var(--w);margin-bottom:5px;letter-spacing:-.01em}
.sec-item p{font-size:13px;color:var(--g1);line-height:1.6}

/* ══════════════════════════════
   CTA
══════════════════════════════ */
.cta-wrap{padding:48px 24px 100px;text-align:center}
.cta-card{
  max-width:460px;margin:0 auto;
  background:var(--s2);
  border:1px solid var(--b);border-radius:22px;
  padding:52px 40px 44px;position:relative;
  transition:border-color .3s,box-shadow .3s;
}
.cta-card:hover{border-color:var(--bh);box-shadow:0 24px 70px rgba(0,0,0,.5)}
.cta-card::before{
  content:'';position:absolute;
  top:-1px;left:25%;right:25%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,59,48,.45),transparent);
}
.cta-logo{margin:0 auto 22px;width:52px;height:52px}

<script>
// GitHub API Release Logic mit Apple-Style Button-Injektion & target="_blank"
const OWNER = 'fglg'; 
const REPO  = 'rema-release';
const FALLBACK = `https://github.com/${OWNER}/${REPO}/releases`;

async function loadRelease(){
  try {
    const res = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/releases/latest`);
    if(!res.ok) throw new Error();
    const data = await res.json();
    
    const ver = data.tag_name || '';
    const asset = data.assets ? data.assets.find(a => a.name.endsWith('.zip') || a.name.endsWith('.exe')) : null;
    if(!asset) throw new Error();
    const directUrl = asset.browser_download_url;

    // Setze Download URL und öffne in neuem Tab/Fenster
    ['hero-btn','cta-btn'].forEach(id => {
      const el = document.getElementById(id);
      if(el){ 
        el.href = directUrl; 
        el.target = '_blank';
        el.classList.remove('loading'); 
      }
    });

    // Haupttext der Buttons setzen
    const heroTxt = document.getElementById('hero-btn-txt');
    const ctaTxt = document.getElementById('cta-btn-txt');
    if(heroTxt) heroTxt.textContent = t('btn_dl');
    if(ctaTxt) ctaTxt.textContent = t('btn_dl');

    // Versionsnummer im Apple-Stil zentriert unter den Text rendern
    if(ver){
      const heroVer = document.getElementById('hero-btn-ver');
      const ctaVer = document.getElementById('cta-btn-ver');
      if(heroVer) {
        heroVer.textContent = ver;
        heroVer.style.display = 'block';
      }
      if(ctaVer) {
        ctaVer.textContent = ver;
        ctaVer.style.display = 'block';
      }

      // Dezenten Versionshinweis unterhalb aktualisieren
      const vl = document.getElementById('ver-line');
      if(vl) vl.innerHTML = `<span style="color:var(--g2)">${ver}</span> &nbsp;·&nbsp; <a id="releases-link" href="${FALLBACK}" target="_blank" rel="noopener noreferrer">${t('all_releases')}</a>`;
    }

  } catch(_) {
    /* Fallback: Direkt zur GitHub Releases-Seite leiten falls API fehlschlägt */
    ['hero-btn','cta-btn'].forEach(id => {
      const el = document.getElementById(id);
      if(el){ 
        el.href = FALLBACK; 
        el.target = '_blank';
        el.classList.remove('loading'); 
      }
    });
    if(document.getElementById('hero-btn-txt')) document.getElementById('hero-btn-txt').textContent = t('btn_dl');
    if(document.getElementById('cta-btn-txt')) document.getElementById('cta-btn-txt').textContent  = t('btn_dl');
    if(document.getElementById('hero-btn-ver')) document.getElementById('hero-btn-ver').style.display = 'none';
    if(document.getElementById('cta-btn-ver')) document.getElementById('cta-btn-ver').style.display = 'none';
  }
}

loadRelease();
applyLang('de');
</script>
